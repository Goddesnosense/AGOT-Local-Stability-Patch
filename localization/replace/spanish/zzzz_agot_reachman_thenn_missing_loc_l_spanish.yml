l_spanish:
 tradition_agot_reachman_name:0 "Herencia del Dominio"
 tradition_agot_reachman_desc:0 "Esta cultura conserva las tradiciones caballerescas, agrícolas y cortesanas del Dominio. Sus gobernantes favorecen los jardines reales, los cargos de jardinero y las formaciones militares propias de las fértiles tierras del sur."
 tradition_agot_thenn_name:0 "Legado de Thenn"
 tradition_agot_thenn_desc:0 "Esta cultura sigue las severas costumbres de Thenn. Sus guerreros valoran el fervor, la disciplina marcial y el armamento de bronce, y consideran la guerra una vía legítima para engrandecer a su pueblo."