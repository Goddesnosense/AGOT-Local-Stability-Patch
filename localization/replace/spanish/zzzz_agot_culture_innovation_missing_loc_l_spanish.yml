l_spanish:
 innovation_unsullied:0 "Inmaculados"
 innovation_unsullied_desc:0 "Esta cultura domina los métodos de selección, disciplina y adiestramiento necesarios para formar a los Inmaculados, una infantería de élite conocida por su obediencia absoluta y su férrea cohesión."
 tradition_agot_moon_clan_name:0 "Clanes de la Luna"
 tradition_agot_moon_clan_desc:0 "Los habitantes de esta cultura siguen las antiguas costumbres de los Clanes de la Luna. Endurecidos por la vida en las Montañas de la Luna, destacan en la guerra de montaña, las emboscadas y las incursiones."